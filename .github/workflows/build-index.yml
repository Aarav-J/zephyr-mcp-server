name: Build and Release Index

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      version:
        description: "Zephyr version tag (e.g. v4.5.0). Defaults to latest."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Determine Zephyr version
        id: version
        run: |
          if [ "${{ inputs.version }}" != "" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG=$(curl -sL https://api.github.com/repos/zephyrproject-rtos/zephyr/releases/latest | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Download Zephyr source
        run: |
          TAG=${{ steps.version.outputs.tag }}
          echo "Downloading Zephyr $TAG..."
          curl -sL -o /tmp/zephyr.tar.gz \
            "https://api.github.com/repos/zephyrproject-rtos/zephyr/tarball/$TAG"
          mkdir -p /tmp/zephyr-src
          tar xzf /tmp/zephyr.tar.gz -C /tmp/zephyr-src --strip-components=1

      - name: Install Doxygen
        run: sudo apt-get update -qq && sudo apt-get install -y -qq doxygen

      - name: Generate Doxygen XML
        run: |
          printf '%s\n' \
            'PROJECT_NAME = "Zephyr API"' \
            'OUTPUT_DIRECTORY = /tmp/zephyr-doxygen' \
            'GENERATE_XML = YES' \
            'GENERATE_HTML = NO' \
            'GENERATE_LATEX = NO' \
            'INPUT = /tmp/zephyr-src/include/zephyr' \
            'RECURSIVE = YES' \
            'FILE_PATTERNS = *.h' \
            'EXTRACT_ALL = YES' \
            'EXTRACT_STATIC = YES' \
            'QUIET = YES' \
            'WARNINGS = NO' \
            'WARN_IF_UNDOCUMENTED = NO' \
            'WARN_NO_PARAMDOC = NO' \
            'MACRO_EXPANSION = YES' \
            'EXPAND_ONLY_PREDEF = YES' \
            'PREDEFINED = __syscall= __syscall_inline=' \
            'INCLUDE_PATH = /tmp/zephyr-src/include' \
            > /tmp/doxyfile
          doxygen /tmp/doxyfile

      - name: Build index
        run: |
          npx tsx scripts/build-index.ts ${{ steps.version.outputs.tag }} \
            --source /tmp/zephyr-src \
            --doxygen /tmp/zephyr-doxygen/xml

      - name: Package index
        run: |
          TAG=${{ steps.version.outputs.tag }}
          INDEX_PATH="$HOME/.zephyr-mcp/indexes/$TAG/zephyr-index.db"
          if [ -f "$INDEX_PATH" ]; then
            cp "$INDEX_PATH" "/tmp/zephyr-index-$TAG.db"
          else
            LATEST=$(ls -t "$HOME/.zephyr-mcp/indexes/" | head -1)
            cp "$HOME/.zephyr-mcp/indexes/$LATEST/zephyr-index.db" "/tmp/zephyr-index-$TAG.db"
          fi
          echo "Packaged: $(du -h /tmp/zephyr-index-$TAG.db | cut -f1)"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: index-${{ steps.version.outputs.tag }}
          name: "Pre-built Index — Zephyr ${{ steps.version.outputs.tag }}"
          body: |
            Auto-built index for Zephyr ${{ steps.version.outputs.tag }}.

            Includes:
            - Function signatures from Doxygen
            - Kconfig symbols
            - Devicetree bindings
            - Sample app configurations

            Built automatically by CI.
          files: /tmp/zephyr-index-${{ steps.version.outputs.tag }}.db
          make_latest: true
